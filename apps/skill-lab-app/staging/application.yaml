apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: skill-lab-staging
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://github.com/my-skill-lab/skillforge-gitops.git
      targetRevision: main
      ref: gitops
    - chart: skill-lab
      repoURL: skillab.jfrog.io/helmoci
      targetRevision: "1.0.14"
      helm:
        valueFiles:
          - $gitops/apps/skill-lab-app/staging/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
