# Staging values — updated by CI (gitops-deploy-staging-skill-lab-app)
image:
  repository: skillab.jfrog.io/docker/skill-lab-app
  tag: "1.0.28"
  pullPolicy: Always

imagePullSecrets:
  - name: fly-staging-registry-secret

replicaCount: 1

env:
  DATABASE_URL: "postgresql://skilllab:skilllab@skill-lab-staging-skill-lab-db:5432/skilllab"
  ANTHROPIC_API_KEY: ""
  NODE_ENV: "production"

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

postgresql:
  enabled: true
