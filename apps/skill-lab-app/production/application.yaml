apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: skill-lab-production
  namespace: argocd
spec:
  project: default
  source:
    # Helm chart from Fly OCI registry
    chart: skill-lab
    repoURL: skillab.jfrog.io/helmoci
    targetRevision: "1.0.17"
    helm:
      valueFiles: []
      values: |
        # Values are managed in this gitops repo
      # Override with values from this git repo
  sources:
    - repoURL: https://github.com/my-skill-lab/skillforge-gitops.git
      targetRevision: main
      ref: gitops
    - chart: skill-lab
      repoURL: skillab.jfrog.io/helmoci
      targetRevision: "1.0.17"
      helm:
        valueFiles:
          - $gitops/apps/skill-lab-app/production/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: production
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
